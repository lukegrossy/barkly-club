<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Session | Barkly Club</title>

  <link rel="stylesheet" href="design-system.css" />

  <style>
    body {
      padding:
        max(26px, env(safe-area-inset-top))
        20px
        110px;
    }

    .session-page {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      margin-bottom: var(--space-xl);
    }

    .eyebrow {
      font-size: var(--text-sm);
      font-weight: var(--font-heavy);

      color: var(--sage);

      margin-bottom: var(--space-xs);
    }

    .topbar h1 {
      font-size: var(--display-md);
      line-height: 1.02;
      letter-spacing: var(--tracking-display);

      margin-bottom: var(--space-sm);
    }

    .topbar p {
      font-size: var(--text-md);
      color: var(--text-secondary);

      line-height: 1.5;
    }

    .avatar {
      width: 48px;
      height: 48px;

      border-radius: var(--radius-pill);

      background: var(--navy);

      color: white;

      display: grid;
      place-items: center;

      font-size: var(--text-sm);
      font-weight: var(--font-heavy);

      flex-shrink: 0;
    }

    .session-card {
      padding: 24px;

      margin-bottom: var(--space-xl);
    }

    .session-meta {
      display: flex;
      flex-wrap: wrap;

      gap: 10px;

      margin-top: var(--space-md);
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;

      gap: 8px;

      padding:
        10px
        14px;

      border-radius: var(--radius-pill);

      background:
        rgba(255,255,255,0.08);

      color:
        rgba(255,255,255,0.76);

      font-size: var(--text-sm);
      font-weight: var(--font-bold);
    }

    .meta-pill svg {
      width: 16px;
      height: 16px;

      stroke-width: 2.2;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: var(--space-md);
    }

    .section-head h2 {
      font-size: var(--text-xl);
      letter-spacing: var(--tracking-tight);
    }

    .attendance-count {
      font-size: var(--text-sm);
      font-weight: var(--font-heavy);

      color: var(--sage);
    }

    .attendance-list {
      display: flex;
      flex-direction: column;

      gap: var(--space-sm);
    }

    .dog-row {
      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 16px;
    }

    .dog-left {
      display: flex;
      align-items: center;

      gap: 14px;
    }

    .dog-avatar {
      width: 52px;
      height: 52px;

      border-radius: var(--radius-md);

      background:
        rgba(138,166,143,0.12);

      display: grid;
      place-items: center;

      color: var(--sage);

      flex-shrink: 0;
    }

    .dog-avatar svg {
      width: 24px;
      height: 24px;

      stroke-width: 2.2;
    }

    .dog-row h3 {
      font-size: 18px;

      margin-bottom: 4px;
    }

    .dog-row p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .checkin-btn {
      width: 46px;
      height: 46px;

      border-radius: var(--radius-pill);

      border: none;

      background:
        rgba(15,31,46,0.08);

      color: var(--text-secondary);

      display: grid;
      place-items: center;

      transition:
        transform var(--transition-fast),
        background var(--transition-fast),
        color var(--transition-fast);
    }

    .checkin-btn svg {
      width: 22px;
      height: 22px;

      stroke-width: 2.6;
    }

    .checkin-btn.checked-in {
      background: var(--sage);
      color: white;
    }

    .checkin-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <main class="session-page">

    <header class="topbar">

      <div>

        <p class="eyebrow">
          Barkly Club
        </p>

        <h1>
          Advanced<br />
          Obedience
        </h1>

        <p>
          Main training field · 4:30 PM · Trainer: Luke Gross
        </p>

      </div>

      <div class="avatar">
        LG
      </div>

    </header>

    <section class="session-card hero-card">

      <span class="pill session-pill">
        Live session
      </span>

      <div class="session-meta">

        <div class="meta-pill">
          <i data-lucide="users"></i>
          12 dogs
        </div>

        <div class="meta-pill">
          <i data-lucide="clock-3"></i>
          60 mins
        </div>

        <div class="meta-pill">
          <i data-lucide="shield-check"></i>
          Intermediate
        </div>

      </div>

    </section>

    <section>

      <div class="section-head">

        <h2>
          Attendance
        </h2>

        <div class="attendance-count">
          8 checked in
        </div>

      </div>

      <div class="attendance-list">

        <div class="dog-row glass-card">

          <div class="dog-left">

            <div class="dog-avatar">
              <i data-lucide="dog"></i>
            </div>

            <div>
              <h3>Bella</h3>
              <p>Golden Retriever</p>
            </div>

          </div>

          <button class="checkin-btn checked-in">
            <i data-lucide="check"></i>
          </button>

        </div>

        <div class="dog-row glass-card">

          <div class="dog-left">

            <div class="dog-avatar">
              <i data-lucide="paw-print"></i>
            </div>

            <div>
              <h3>Charlie</h3>
              <p>Border Collie</p>
            </div>

          </div>

          <button class="checkin-btn checked-in">
            <i data-lucide="check"></i>
          </button>

        </div>

        <div class="dog-row glass-card">

          <div class="dog-left">

            <div class="dog-avatar">
              <i data-lucide="dog"></i>
            </div>

            <div>
              <h3>Luna</h3>
              <p>Labrador</p>
            </div>

          </div>

          <button class="checkin-btn">
            <i data-lucide="plus"></i>
          </button>

        </div>

        <div class="dog-row glass-card">

          <div class="dog-left">

            <div class="dog-avatar">
              <i data-lucide="paw-print"></i>
            </div>

            <div>
              <h3>Max</h3>
              <p>German Shepherd</p>
            </div>

          </div>

          <button class="checkin-btn">
            <i data-lucide="plus"></i>
          </button>

        </div>

      </div>

    </section>

  </main>

  <nav class="bottom-nav">

    <a href="trainer-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="home"></i>
      </div>
      Home
    </a>

    <a href="session-detail.html" class="bottom-nav-item active">
      <div class="bottom-nav-icon">
        <i data-lucide="calendar-check"></i>
      </div>
      Sessions
    </a>

    <a href="dogs.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="dog"></i>
      </div>
      Dogs
    </a>

    <a href="school-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="users"></i>
      </div>
      Club
    </a>

  </nav>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    lucide.createIcons();

    document.querySelectorAll(".checkin-btn").forEach((button) => {
      button.addEventListener("click", () => {
        button.classList.toggle("checked-in");

        const icon = button.querySelector("svg");

        if (button.classList.contains("checked-in")) {
          icon.setAttribute("data-lucide", "check");
        } else {
          icon.setAttribute("data-lucide", "plus");
        }

        button.innerHTML = button.classList.contains("checked-in")
          ? '<i data-lucide="check"></i>'
          : '<i data-lucide="plus"></i>';

        lucide.createIcons();
      });
    });
  </script>

</body>
</html>
