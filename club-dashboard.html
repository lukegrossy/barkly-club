<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>School | Barkly Schools/title>

  <link rel="stylesheet" href="design-system.css" />

  <style>
    body {
      padding:
        max(26px, env(safe-area-inset-top))
        20px
        110px;
    }

    .club-page {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
    }

    .eyebrow {
      font-size: var(--text-sm);
      font-weight: var(--font-heavy);
      color: var(--sage);
      margin-bottom: var(--space-xs);
    }

    .topbar h1 {
      font-size: var(--display-md);
      line-height: 1.02;
      letter-spacing: var(--tracking-display);
      margin-bottom: var(--space-sm);
    }

    .topbar p {
      font-size: var(--text-md);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-pill);
      background: var(--navy);
      color: white;
      display: grid;
      place-items: center;
      font-size: var(--text-sm);
      font-weight: var(--font-heavy);
      flex-shrink: 0;
    }

    .club-card {
      padding: 26px;
      margin-bottom: var(--space-lg);
    }

    .club-card h2 {
      margin-bottom: var(--space-xs);
    }

    .club-card p {
      font-size: var(--text-md);
      line-height: 1.5;
      color: rgba(255,255,255,0.72);
    }

    .club-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: var(--space-md);
    }

    .club-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.76);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
    }

    .club-pill svg {
      width: 16px;
      height: 16px;
      stroke-width: 2.2;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
    }

    .metric {
      padding: var(--space-lg);
    }

    .metric strong {
      display: block;
      font-size: var(--display-lg);
      line-height: 1;
      letter-spacing: var(--tracking-display);
      margin-bottom: var(--space-xs);
    }

    .metric span {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      color: var(--text-secondary);
    }

    .metric svg {
      width: 15px;
      height: 15px;
      stroke-width: 2.2;
      color: var(--sage);
    }

    .section {
      margin-bottom: var(--space-xl);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-sm);
    }

    .section-head h2 {
      font-size: var(--text-xl);
      letter-spacing: var(--tracking-tight);
    }

    .section-head a {
      color: var(--sage);
      text-decoration: none;
      font-size: var(--text-sm);
      font-weight: var(--font-heavy);
    }

    .event-list,
    .trainer-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .event,
    .trainer {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      text-decoration: none;
      color: inherit;
    }

    .event-left,
    .trainer-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .event-icon,
    .trainer-icon {
      width: 50px;
      height: 50px;
      border-radius: var(--radius-md);
      background: rgba(138,166,143,0.12);
      color: var(--sage);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .event-icon svg,
    .trainer-icon svg {
      width: 23px;
      height: 23px;
      stroke-width: 2.2;
    }

    .event h3,
    .trainer h3 {
      font-size: 17px;
      margin-bottom: var(--space-2xs);
    }

    .event p,
    .trainer p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .status-pill {
      padding: 9px 12px;
      border-radius: var(--radius-pill);
      background: rgba(138,166,143,0.14);
      color: var(--sage);
      font-size: var(--text-xs);
      font-weight: var(--font-heavy);
      white-space: nowrap;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
    }

    .quick-action {
      padding: 18px;
      text-decoration: none;
      color: inherit;
    }

    .quick-action svg {
      width: 22px;
      height: 22px;
      color: var(--sage);
      margin-bottom: var(--space-sm);
    }

    .quick-action h3 {
      font-size: 16px;
      margin-bottom: var(--space-2xs);
    }

    .quick-action p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <main class="club-page">

    <header class="topbar">

      <div>
        <p class="eyebrow">
          Barkly School
        </p>

        <h1>
          Club<br />
          dashboard
        </h1>

        <p>
          Manage members, trainers and today’s school operations.
        </p>
      </div>

      <div class="avatar">
        LG
      </div>

    </header>

    <section class="club-card hero-card">

      <span class="pill session-label">
        Club overview
      </span>

      <h2 class="display-md">
        Melbourne Canine Club
      </h2>

      <p>
        A calm overview of attendance, members and upcoming training activity.
      </p>

      <div class="club-meta">

        <div class="club-pill">
          <i data-lucide="users"></i>
          148 members
        </div>

        <div class="club-pill">
          <i data-lucide="calendar-check"></i>
          42 sessions
        </div>

        <div class="club-pill">
          <i data-lucide="activity"></i>
          94% attendance
        </div>

      </div>

    </section>

    <section class="metrics">

      <div class="metric glass-card">
        <strong>148</strong>
        <span>
          <i data-lucide="users"></i>
          Members
        </span>
      </div>

      <div class="metric glass-card">
        <strong>26</strong>
        <span>
          <i data-lucide="dog"></i>
          Dogs today
        </span>
      </div>

    </section>

    <section class="section">

      <div class="section-head">
        <h2>Upcoming events</h2>

        <a href="session-detail.html">
          View all
        </a>
      </div>

      <div class="event-list">

        <a href="session-detail.html" class="event glass-card">

          <div class="event-left">

            <div class="event-icon">
              <i data-lucide="calendar-check"></i>
            </div>

            <div>
              <h3>Advanced Obedience</h3>
              <p>Tuesday · 4:30 PM · Main field</p>
            </div>

          </div>

          <span class="status-pill">
            Today
          </span>

        </a>

        <a href="session-detail.html" class="event glass-card">

          <div class="event-left">

            <div class="event-icon">
              <i data-lucide="paw-print"></i>
            </div>

            <div>
              <h3>Puppy Socialisation</h3>
              <p>Wednesday · 10:00 AM · Indoor arena</p>
            </div>

          </div>

          <span class="status-pill">
            Upcoming
          </span>

        </a>

      </div>

    </section>

    <section class="section">

      <div class="section-head">
        <h2>Trainer roster</h2>

        <a href="#">
          Manage
        </a>
      </div>

      <div class="trainer-list">

        <div class="trainer glass-card">

          <div class="trainer-left">

            <div class="trainer-icon">
              <i data-lucide="user-check"></i>
            </div>

            <div>
              <h3>Sarah Mitchell</h3>
              <p>Senior trainer</p>
            </div>

          </div>

          <span class="status-pill">
            Active
          </span>

        </div>

        <div class="trainer glass-card">

          <div class="trainer-left">

            <div class="trainer-icon">
              <i data-lucide="user-check"></i>
            </div>

            <div>
              <h3>James Carter</h3>
              <p>Puppy development</p>
            </div>

          </div>

          <span class="status-pill">
            Active
          </span>

        </div>

      </div>

    </section>

    <section class="section">

      <div class="section-head">
        <h2>Quick actions</h2>
      </div>

      <div class="quick-actions">

        <a href="dogs.html" class="quick-action glass-card">
          <i data-lucide="plus-circle"></i>
          <h3>Add dog</h3>
          <p>Create a new dog profile.</p>
        </a>

        <a href="session-detail.html" class="quick-action glass-card">
          <i data-lucide="clipboard-check"></i>
          <h3>Start check-in</h3>
          <p>Open today’s attendance.</p>
        </a>

      </div>

    </section>

  </main>

  <nav class="bottom-nav">

    <a href="trainer-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="home"></i>
      </div>
      Home
    </a>

    <a href="session-detail.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="calendar-check"></i>
      </div>
      Sessions
    </a>

    <a href="dogs.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="dog"></i>
      </div>
      Dogs
    </a>

    <a href="school-dashboard.html" class="bottom-nav-item active">
      <div class="bottom-nav-icon">
        <i data-lucide="users"></i>
      </div>
      Club
    </a>

  </nav>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
