<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Barkly Club</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main class="dashboard-screen">

    <header class="dashboard-header">

      <div class="dashboard-brand">
        <img
          src="assets/barkly-icon.png"
          alt="Barkly"
          class="dashboard-icon"
        />

        <div>
          <p class="dashboard-label">
            Barkly Club
          </p>

          <h1>
            Good afternoon, Luke
          </h1>
        </div>
      </div>

      <div class="dashboard-avatar">
        LG
      </div>

    </header>

    <section class="stats-grid">

      <div class="stat-card">
        <span class="stat-number">18</span>
        <span class="stat-label">Dogs today</span>
      </div>

      <div class="stat-card">
        <span class="stat-number">4</span>
        <span class="stat-label">Sessions</span>
      </div>

    </section>

    <section class="session-card">

      <div class="session-top">
        <span class="session-badge">
          Next session
        </span>

        <span class="session-time">
          4:30 PM
        </span>
      </div>

      <h2>
        Advanced Obedience
      </h2>

      <p>
        12 dogs attending · Main training field
      </p>

    </section>

    <section class="dashboard-section">

      <div class="section-heading">
        <h3>Recent dogs</h3>

        <a href="#">
          View all
        </a>
      </div>

      <div class="dog-list">

        <div class="dog-card">
          <div class="dog-avatar">🐕</div>

          <div>
            <h4>Bella</h4>
            <p>Golden Retriever</p>
          </div>
        </div>

        <div class="dog-card">
          <div class="dog-avatar">🐶</div>

          <div>
            <h4>Charlie</h4>
            <p>Border Collie</p>
          </div>
        </div>

        <div class="dog-card">
          <div class="dog-avatar">🐕‍🦺</div>

          <div>
            <h4>Luna</h4>
            <p>Labrador</p>
          </div>
        </div>

      </div>

    </section>

  </main>

</body>
</html>
