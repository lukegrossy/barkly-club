<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Barkly Club</title>

  <style>
    :root {
      --navy: #0F1F2E;
      --sage: #8AA68F;
      --cream: #F2EDE3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Inter",
        "Segoe UI",
        sans-serif;

      background:
        radial-gradient(circle at top, rgba(255,255,255,0.82), transparent 42%),
        linear-gradient(180deg, #f8f4eb 0%, #f2ede3 100%);

      color: var(--navy);

      padding:
        max(26px, env(safe-area-inset-top))
        20px
        110px;
    }

    .dashboard {
      max-width: 560px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 800;

      color: var(--sage);

      margin-bottom: 4px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.04;
      letter-spacing: -0.05em;
    }

    .avatar {
      width: 48px;
      height: 48px;

      border-radius: 999px;

      background: var(--navy);

      color: white;

      display: grid;
      place-items: center;

      font-size: 14px;
      font-weight: 800;

      flex-shrink: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;

      margin-bottom: 18px;
    }

    .stat {
      background: rgba(255,255,255,0.72);

      border: 1.5px solid rgba(15,31,46,0.08);

      border-radius: 28px;

      padding: 22px;
    }

    .stat strong {
      display: block;

      font-size: 40px;
      line-height: 1;

      letter-spacing: -0.06em;

      margin-bottom: 10px;
    }

    .stat span {
      font-size: 14px;
      font-weight: 700;

      color: rgba(15,31,46,0.62);
    }

    .session {
      background: var(--navy);

      color: white;

      border-radius: 34px;

      padding: 26px;

      margin-bottom: 28px;

      box-shadow:
        0 18px 36px rgba(15,31,46,0.16);
    }

    .session-label {
      display: inline-flex;

      padding: 8px 12px;

      border-radius: 999px;

      background: rgba(138,166,143,0.22);

      color: #dce8df;

      font-size: 12px;
      font-weight: 800;

      margin-bottom: 18px;
    }

    .session h2 {
      font-size: 30px;
      line-height: 1.04;
      letter-spacing: -0.06em;

      margin-bottom: 10px;
    }

    .session p {
      font-size: 15px;
      line-height: 1.5;

      color: rgba(255,255,255,0.72);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 14px;
    }

    .section-head h3 {
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .section-head a {
      color: var(--sage);

      text-decoration: none;

      font-size: 14px;
      font-weight: 800;
    }

    .dog-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dog {
      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 16px;

      border-radius: 24px;

      background: rgba(255,255,255,0.72);

      border: 1.5px solid rgba(15,31,46,0.08);

      text-decoration: none;

      color: inherit;
    }

    .dog-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .dog-avatar {
      width: 50px;
      height: 50px;

      border-radius: 18px;

      background: rgba(138,166,143,0.12);

      display: grid;
      place-items: center;

      font-size: 24px;
    }

    .dog h4 {
      font-size: 17px;
      margin-bottom: 4px;
    }

    .dog p {
      font-size: 14px;
      color: rgba(15,31,46,0.62);
    }

    .nav {
      position: fixed;

      left: 50%;
      bottom: 18px;

      transform: translateX(-50%);

      width: calc(100% - 34px);
      max-width: 540px;

      background: rgba(255,255,255,0.82);

      backdrop-filter: blur(24px);

      border: 1px solid rgba(15,31,46,0.06);

      border-radius: 24px;

      padding:
        10px
        8px
        calc(10px + env(safe-area-inset-bottom));

      display: flex;
      justify-content: space-around;

      box-shadow:
        0 10px 24px rgba(15,31,46,0.08);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;

      gap: 4px;

      min-width: 62px;

      text-decoration: none;

      color: rgba(15,31,46,0.42);

      font-size: 11px;
      font-weight: 700;
    }

    .nav-icon {
      width: 36px;
      height: 36px;

      border-radius: 12px;

      display: grid;
      place-items: center;

      font-size: 18px;
    }

    .nav-item.active {
      color: var(--navy);
    }

    .nav-item.active .nav-icon {
      background: rgba(15,31,46,0.08);
    }
  </style>
</head>

<body>

  <main class="dashboard">

    <header class="topbar">

      <div class="brand">

        <img
          src="assets/barkly-icon.png"
          alt="Barkly"
        />

        <div>
          <p class="eyebrow">
            Barkly Club
          </p>

          <h1>
            Good afternoon, Luke
          </h1>
        </div>

      </div>

      <div class="avatar">
        LG
      </div>

    </header>

    <section class="stats">

      <div class="stat">
        <strong>18</strong>
        <span>Dogs today</span>
      </div>

      <div class="stat">
        <strong>4</strong>
        <span>Sessions</span>
      </div>

    </section>

    <section class="session">

      <span class="session-label">
        Next session
      </span>

      <h2>
        Advanced Obedience
      </h2>

      <p>
        12 dogs attending · Main training field · 4:30 PM
      </p>

    </section>

    <section>

      <div class="section-head">
        <h3>Recent dogs</h3>

        <a href="member-profile.html">
          View all
        </a>
      </div>

      <div class="dog-list">

        <a
          href="member-profile.html"
          class="dog"
        >

          <div class="dog-left">

            <div class="dog-avatar">
              🐕
            </div>

            <div>
              <h4>Bella</h4>
              <p>Golden Retriever</p>
            </div>

          </div>

        </a>

        <a
          href="member-profile.html"
          class="dog"
        >

          <div class="dog-left">

            <div class="dog-avatar">
              🐶
            </div>

            <div>
              <h4>Charlie</h4>
              <p>Border Collie</p>
            </div>

          </div>

        </a>

      </div>

    </section>

  </main>

  <nav class="nav">

    <a href="trainer-dashboard.html" class="nav-item active">
      <div class="nav-icon">🏠</div>
      Home
    </a>

    <a href="session-detail.html" class="nav-item">
      <div class="nav-icon">📋</div>
      Sessions
    </a>

    <a href="member-profile.html" class="nav-item">
      <div class="nav-icon">🐕</div>
      Dogs
    </a>

    <a href="club-dashboard.html" class="nav-item">
      <div class="nav-icon">👥</div>
      Club
    </a>

  </nav>

</body>
</html>
