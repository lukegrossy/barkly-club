<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Barkly Club</title>

  <style>
    :root {
      --navy: #0F1F2E;
      --sage: #8AA68F;
      --cream: #F2EDE3;
      --white: #FFFCF7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.82), transparent 42%),
        linear-gradient(180deg, #f8f4eb 0%, #f2ede3 100%);
      color: var(--navy);
      padding:
        max(26px, env(safe-area-inset-top))
        20px
        max(34px, env(safe-area-inset-bottom));
    }

    .dashboard {
      max-width: 520px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 800;
      color: var(--sage);
      margin-bottom: 3px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.04;
      letter-spacing: -0.05em;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: var(--navy);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      background: rgba(255,255,255,0.72);
      border: 1.5px solid rgba(15,31,46,0.08);
      border-radius: 28px;
      padding: 22px;
    }

    .stat strong {
      display: block;
      font-size: 40px;
      line-height: 1;
      letter-spacing: -0.06em;
      margin-bottom: 10px;
    }

    .stat span {
      font-size: 14px;
      font-weight: 700;
      color: rgba(15,31,46,0.62);
    }

    .session {
      background: var(--navy);
      color: white;
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 18px 36px rgba(15,31,46,0.16);
    }

    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(138,166,143,0.22);
      color: #dce8df;
      font-size: 12px;
      font-weight: 800;
    }

    .time {
      font-size: 14px;
      font-weight: 800;
      color: rgba(255,255,255,0.76);
    }

    .session h2 {
      font-size: 29px;
      line-height: 1.08;
      letter-spacing: -0.05em;
      margin-bottom: 10px;
    }

    .session p {
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255,255,255,0.72);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-head h3 {
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .section-head a {
      color: var(--sage);
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
    }

    .dog-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dog {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: rgba(255,255,255,0.72);
      border: 1.5px solid rgba(15,31,46,0.08);
      border-radius: 24px;
    }

    .dog-icon {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      background: rgba(138,166,143,0.12);
      display: grid;
      place-items: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .dog h4 {
      font-size: 17px;
      margin-bottom: 4px;
    }

    .dog p {
      font-size: 14px;
      color: rgba(15,31,46,0.62);
    }
  </style>
</head>

<body>
  <main class="dashboard">

    <header class="topbar">
      <div class="brand">
        <img src="assets/barkly-icon.png" alt="Barkly" />

        <div>
          <p class="eyebrow">Barkly Club</p>
          <h1>Good afternoon, Luke</h1>
        </div>
      </div>

      <div class="avatar">LG</div>
    </header>

    <section class="stats">
      <div class="stat">
        <strong>18</strong>
        <span>Dogs today</span>
      </div>

      <div class="stat">
        <strong>4</strong>
        <span>Sessions</span>
      </div>
    </section>

    <section class="session">
      <div class="session-row">
        <span class="badge">Next session</span>
        <span class="time">4:30 PM</span>
      </div>

      <h2>Advanced Obedience</h2>
      <p>12 dogs attending · Main training field</p>
    </section>

    <section>
      <div class="section-head">
        <h3>Recent dogs</h3>
        <a href="#">View all</a>
      </div>

      <div class="dog-list">
        <article class="dog">
          <div class="dog-icon">🐕</div>
          <div>
            <h4>Bella</h4>
            <p>Golden Retriever</p>
          </div>
        </article>

        <article class="dog">
          <div class="dog-icon">🐶</div>
          <div>
            <h4>Charlie</h4>
            <p>Border Collie</p>
          </div>
        </article>

        <article class="dog">
          <div class="dog-icon">🐕‍🦺</div>
          <div>
            <h4>Luna</h4>
            <p>Labrador</p>
          </div>
        </article>
      </div>
    </section>

  </main>
</body>
</html>
