<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Choose role | Barkly Club</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main class="role-screen">

    <header class="auth-header">
      <a href="create-account.html" class="back-link">
        ←
      </a>
    </header>

    <section class="role-panel">

      <img
        src="assets/barkly-logo.png"
        alt="Barkly"
        class="auth-logo-small"
      />

      <div class="role-copy">
        <h1>Welcome to Barkly Club</h1>

        <p>
          Choose how you’ll use Barkly.
        </p>
      </div>

      <div class="role-options">

        <a href="#" class="role-card">

          <div class="role-icon">
            🐶
          </div>

          <div class="role-text">
            <h2>Dog owner</h2>

            <p>
              Track your dogs, sessions and club activity.
            </p>
          </div>

        </a>

        <a href="#" class="role-card">

          <div class="role-icon">
            🦮
          </div>

          <div class="role-text">
            <h2>Trainer</h2>

            <p>
              Manage members, dogs and training sessions.
            </p>
          </div>

        </a>

        <a href="#" class="role-card">

          <div class="role-icon">
            🏆
          </div>

          <div class="role-text">
            <h2>Club owner</h2>

            <p>
              Run your club, attendance and member operations.
            </p>
          </div>

        </a>

      </div>

    </section>

  </main>

</body>
</html>
