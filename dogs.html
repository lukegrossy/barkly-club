<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Dogs | Barkly Club</title>

  <link rel="stylesheet" href="design-system.css" />

  <style>
    body {
      padding:
        max(26px, env(safe-area-inset-top))
        20px
        110px;
    }

    .dogs-page {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: var(--space-xl);
    }

    .topbar h1 {
      font-size: var(--display-lg);
      letter-spacing: var(--tracking-display);
    }

    .avatar {
      width: 48px;
      height: 48px;

      border-radius: var(--radius-pill);

      background: var(--navy);

      color: white;

      display: grid;
      place-items: center;

      font-size: var(--text-sm);
      font-weight: var(--font-heavy);
    }

    .search-wrap {
      display: flex;
      gap: var(--space-sm);

      margin-bottom: var(--space-xl);
    }

    .search {
      flex: 1;
    }

    .filter {
      width: 62px;
      height: 58px;

      border-radius: var(--radius-md);

      border:
        1.5px solid var(--glass-border);

      background:
        rgba(255,255,255,0.72);

      display: grid;
      place-items: center;
    }

    .filter svg {
      width: 20px;
      height: 20px;

      stroke-width: 2.2;
    }

    .dog-grid {
      display: flex;
      flex-direction: column;

      gap: var(--space-lg);
    }

    .dog-card {
      display: block;

      text-decoration: none;

      color: inherit;

      background: var(--glass);

      border:
        1.5px solid var(--glass-border);

      border-radius: var(--radius-xl);

      overflow: hidden;

      box-shadow: var(--shadow-card);

      transition:
        transform var(--transition-fast),
        box-shadow var(--transition-fast);
    }

    .dog-card:active {
      transform: scale(0.985);
    }

    .dog-photo {
      width: 100%;
      height: 240px;

      object-fit: cover;

      display: block;
    }

    .dog-content {
      padding: var(--space-lg);
    }

    .dog-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      gap: var(--space-sm);

      margin-bottom: var(--space-sm);
    }

    .dog-name {
      margin-bottom: var(--space-xs);
    }

    .status {
      background:
        rgba(138,166,143,0.14);

      color: var(--sage);

      white-space: nowrap;
    }

    .dog-meta {
      display: flex;
      flex-wrap: wrap;

      gap: 10px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;

      gap: 7px;

      padding:
        10px
        14px;

      border-radius: var(--radius-pill);

      background:
        rgba(15,31,46,0.06);

      font-size: var(--text-sm);
      font-weight: var(--font-bold);

      color: var(--text-secondary);
    }

    .meta-pill svg {
      width: 15px;
      height: 15px;

      stroke-width: 2.2;

      color: var(--sage);
    }
  </style>
</head>

<body>

  <main class="dogs-page">

    <header class="topbar">

      <h1>
        Dogs
      </h1>

      <div class="avatar">
        LG
      </div>

    </header>

    <section class="search-wrap">

      <input
        type="text"
        class="input search"
        placeholder="Search dogs"
      />

      <button class="filter btn" aria-label="Filter dogs">
        <i data-lucide="sliders-horizontal"></i>
      </button>

    </section>

    <section class="dog-grid">

      <a
        href="member-profile.html"
        class="dog-card"
      >

        <img
          src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop"
          alt="Bella"
          class="dog-photo"
        />

        <div class="dog-content">

          <div class="dog-top">

            <div>
              <h2 class="dog-name display-sm">
                Bella
              </h2>

              <p class="dog-breed text-secondary">
                Golden Retriever · 3 years old
              </p>
            </div>

            <span class="status pill">
              Active
            </span>

          </div>

          <div class="dog-meta">

            <div class="meta-pill">
              <i data-lucide="user"></i>
              Sarah Mitchell
            </div>

            <div class="meta-pill">
              <i data-lucide="calendar-check"></i>
              24 sessions
            </div>

          </div>

        </div>

      </a>

      <a
        href="member-profile.html"
        class="dog-card"
      >

        <img
          src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?q=80&w=1200&auto=format&fit=crop"
          alt="Charlie"
          class="dog-photo"
        />

        <div class="dog-content">

          <div class="dog-top">

            <div>
              <h2 class="dog-name display-sm">
                Charlie
              </h2>

              <p class="dog-breed text-secondary">
                Border Collie · 2 years old
              </p>
            </div>

            <span class="status pill">
              Training
            </span>

          </div>

          <div class="dog-meta">

            <div class="meta-pill">
              <i data-lucide="user"></i>
              James Carter
            </div>

            <div class="meta-pill">
              <i data-lucide="calendar-check"></i>
              18 sessions
            </div>

          </div>

        </div>

      </a>

    </section>

  </main>

  <nav class="bottom-nav">

    <a href="trainer-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="home"></i>
      </div>
      Home
    </a>

    <a href="session-detail.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="calendar-check"></i>
      </div>
      Sessions
    </a>

    <a href="dogs.html" class="bottom-nav-item active">
      <div class="bottom-nav-icon">
        <i data-lucide="dog"></i>
      </div>
      Dogs
    </a>

    <a href="club-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="users"></i>
      </div>
      Club
    </a>

  </nav>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
