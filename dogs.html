<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Dogs | Barkly Club</title>

<link rel="stylesheet" href="design-system.css" />

  <style>
    :root {
      --navy: #0F1F2E;
      --sage: #8AA68F;
      --cream: #F2EDE3;
      --white: #FFFCF7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Inter",
        "Segoe UI",
        sans-serif;

      background:
        radial-gradient(circle at top, rgba(255,255,255,0.82), transparent 42%),
        linear-gradient(180deg, #f8f4eb 0%, #f2ede3 100%);

      color: var(--navy);

      padding:
        max(26px, env(safe-area-inset-top))
        20px
        110px;
    }

    .dogs-page {
      max-width: 560px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 26px;
    }

    .topbar h1 {
      font-size: 32px;
      letter-spacing: -0.06em;
    }

    .avatar {
      width: 46px;
      height: 46px;

      border-radius: 999px;

      background: var(--navy);

      color: white;

      display: grid;
      place-items: center;

      font-size: 14px;
      font-weight: 800;
    }

    .search-wrap {
      display: flex;
      gap: 12px;

      margin-bottom: 24px;
    }

    .search {
      flex: 1;

      height: 58px;

      border-radius: 20px;

      border: 1.5px solid rgba(15,31,46,0.08);

      background: rgba(255,255,255,0.72);

      padding: 0 18px;

      font-size: 15px;

      outline: none;
    }

    .filter {
      height: 58px;

      padding: 0 18px;

      border-radius: 20px;

      border: 1.5px solid rgba(15,31,46,0.08);

      background: rgba(255,255,255,0.72);

      font-size: 14px;
      font-weight: 800;

      color: var(--navy);
    }

    .dog-grid {
      display: flex;
      flex-direction: column;

      gap: 18px;
    }

    .dog-card {
      display: block;

      text-decoration: none;

      color: inherit;

      background: rgba(255,255,255,0.76);

      border: 1.5px solid rgba(15,31,46,0.08);

      border-radius: 32px;

      overflow: hidden;

      box-shadow:
        0 12px 30px rgba(15,31,46,0.06);
    }

    .dog-photo {
      width: 100%;
      height: 240px;

      object-fit: cover;

      display: block;
    }

    .dog-content {
      padding: 22px;
    }

    .dog-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      gap: 12px;

      margin-bottom: 12px;
    }

    .dog-name {
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.05em;

      margin-bottom: 8px;
    }

    .dog-breed {
      font-size: 15px;

      color: rgba(15,31,46,0.62);
    }

    .status {
      padding: 10px 14px;

      border-radius: 999px;

      background: rgba(138,166,143,0.14);

      color: var(--sage);

      font-size: 12px;
      font-weight: 800;

      white-space: nowrap;
    }

    .dog-meta {
      display: flex;
      flex-wrap: wrap;

      gap: 10px;
    }

    .meta-pill {
      padding: 10px 14px;

      border-radius: 999px;

      background: rgba(15,31,46,0.06);

      font-size: 13px;
      font-weight: 700;

      color: rgba(15,31,46,0.72);
    }

    .nav {
      position: fixed;

      left: 50%;
      bottom: 18px;

      transform: translateX(-50%);

      width: calc(100% - 34px);
      max-width: 540px;

      background: rgba(255,255,255,0.82);

      backdrop-filter: blur(24px);

      border: 1px solid rgba(15,31,46,0.06);

      border-radius: 24px;

      padding:
        10px
        8px
        calc(10px + env(safe-area-inset-bottom));

      display: flex;
      justify-content: space-around;

      box-shadow:
        0 10px 24px rgba(15,31,46,0.08);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;

      gap: 4px;

      min-width: 62px;

      text-decoration: none;

      color: rgba(15,31,46,0.42);

      font-size: 11px;
      font-weight: 700;
    }

    .nav-icon {
      width: 36px;
      height: 36px;

      border-radius: 12px;

      display: grid;
      place-items: center;

      font-size: 18px;
    }

    .nav-item.active {
      color: var(--navy);
    }

    .nav-item.active .nav-icon {
      background: rgba(15,31,46,0.08);
    }
  </style>
</head>

<body>

  <main class="dogs-page">

    <header class="topbar">

      <h1>
        Dogs
      </h1>

      <div class="avatar">
        LG
      </div>

    </header>

    <section class="search-wrap">

      <input
        type="text"
        class="search"
        placeholder="Search dogs"
      />

      <button class="filter">
        Filter
      </button>

    </section>

    <section class="dog-grid">

      <a
        href="member-profile.html"
        class="dog-card"
      >

        <img
          src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop"
          alt="Bella"
          class="dog-photo"
        />

        <div class="dog-content">

          <div class="dog-top">

            <div>
              <h2 class="dog-name">
                Bella
              </h2>

              <p class="dog-breed">
                Golden Retriever · 3 years old
              </p>
            </div>

            <span class="status">
              Active
            </span>

          </div>

          <div class="dog-meta">

            <div class="meta-pill">
              Owner: Sarah Mitchell
            </div>

            <div class="meta-pill">
              24 sessions
            </div>

          </div>

        </div>

      </a>

      <a
        href="member-profile.html"
        class="dog-card"
      >

        <img
          src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?q=80&w=1200&auto=format&fit=crop"
          alt="Charlie"
          class="dog-photo"
        />

        <div class="dog-content">

          <div class="dog-top">

            <div>
              <h2 class="dog-name">
                Charlie
              </h2>

              <p class="dog-breed">
                Border Collie · 2 years old
              </p>
            </div>

            <span class="status">
              Training
            </span>

          </div>

          <div class="dog-meta">

            <div class="meta-pill">
              Owner: James Carter
            </div>

            <div class="meta-pill">
              18 sessions
            </div>

          </div>

        </div>

      </a>

    </section>

  </main>

  <nav class="nav">

    <a href="trainer-dashboard.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      Home
    </a>

    <a href="session-detail.html" class="nav-item">
      <div class="nav-icon">📋</div>
      Sessions
    </a>

    <a href="dogs.html" class="nav-item active">
      <div class="nav-icon">🐕</div>
      Dogs
    </a>

    <a href="club-dashboard.html" class="nav-item">
      <div class="nav-icon">👥</div>
      Club
    </a>

  </nav>

</body>
</html>
