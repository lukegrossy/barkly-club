<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Dogs | Barkly Schools</title>

  <link rel="stylesheet" href="design-system.css" />

  <style>
    body {
      padding:
        max(26px, env(safe-area-inset-top))
        20px
        110px;
    }

    .dogs-page {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: var(--space-xl);
    }

    .topbar h1 {
      font-size: var(--display-lg);
      letter-spacing: var(--tracking-display);
    }

    .avatar {
      width: 52px;
      height: 52px;

      border-radius: var(--radius-pill);

      background: var(--navy);

      color: white;

      display: grid;
      place-items: center;

      font-size: var(--text-sm);
      font-weight: var(--font-black);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 86px;

      gap: 14px;

      margin-bottom: var(--space-xl);
    }

    .search-input,
    .filter-btn {
      height: 72px;

      border-radius: var(--radius-xl);

      border:
        1.5px solid rgba(15,31,46,0.06);

      background:
        rgba(255,255,255,0.72);

      backdrop-filter: blur(12px);
    }

    .search-input {
      padding:
        0
        26px;

      font-size: var(--text-lg);

      color: var(--navy);
    }

    .search-input::placeholder {
      color: rgba(15,31,46,0.34);
    }

    .filter-btn {
      display: grid;
      place-items: center;

      color: #2F80ED;
    }

    .filter-btn svg {
      width: 26px;
      height: 26px;

      stroke-width: 2.2;
    }

    .dogs-grid {
      display: flex;
      flex-direction: column;

      gap: var(--space-lg);
    }

    .dog-card {
      overflow: hidden;

      text-decoration: none;

      color: inherit;
    }

    .dog-image {
      width: 100%;
      height: 320px;

      object-fit: cover;

      display: block;
    }

    .dog-content {
      padding: 24px;
    }

    .dog-top {
      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 14px;

      margin-bottom: 12px;
    }

    .dog-top h2 {
      font-size: 44px;
      line-height: 1;
      letter-spacing: var(--tracking-display);
    }

    .status-pill {
      padding:
        10px
        18px;

      border-radius: var(--radius-pill);

      background:
        rgba(138,166,143,0.12);

      color: var(--sage);

      font-size: var(--text-sm);
      font-weight: var(--font-heavy);

      white-space: nowrap;
    }

    .dog-subtitle {
      font-size: var(--text-lg);

      color: var(--text-secondary);

      margin-bottom: var(--space-md);
    }

    .dog-meta {
      display: flex;
      flex-wrap: wrap;

      gap: 12px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;

      gap: 10px;

      padding:
        12px
        16px;

      border-radius: var(--radius-pill);

      background:
        rgba(15,31,46,0.04);

      color: var(--text-secondary);

      font-size: var(--text-md);
      font-weight: var(--font-bold);
    }

    .meta-pill svg {
      width: 18px;
      height: 18px;

      color: var(--sage);

      stroke-width: 2.2;
    }
  </style>
</head>

<body>

  <main class="dogs-page fade-in">

    <header class="topbar">

      <h1>
        Dogs
      </h1>

      <div class="avatar">
        LG
      </div>

    </header>

    <section class="search-row">

      <input
        type="text"
        placeholder="Search dogs"
        class="search-input"
      />

      <button class="filter-btn">

        <i data-lucide="sliders-horizontal"></i>

      </button>

    </section>

    <section class="dogs-grid">

      <a
        href="member-profile.html"
        class="dog-card glass-card lift-card"
      >

        <img
          src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?q=80&w=1200&auto=format&fit=crop"
          alt="Bella"
          class="dog-image"
        />

        <div class="dog-content">

          <div class="dog-top">

            <h2>
              Bella
            </h2>

            <span class="status-pill">
              Active
            </span>

          </div>

          <p class="dog-subtitle">
            Golden Retriever · 3 years old
          </p>

          <div class="dog-meta">

            <div class="meta-pill">
              <i data-lucide="user"></i>
              Sarah Mitchell
            </div>

            <div class="meta-pill">
              <i data-lucide="calendar-check"></i>
              24 sessions
            </div>

          </div>

        </div>

      </a>

      <a
        href="member-profile.html"
        class="dog-card glass-card lift-card"
      >

        <img
          src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop"
          alt="Charlie"
          class="dog-image"
        />

        <div class="dog-content">

          <div class="dog-top">

            <h2>
              Charlie
            </h2>

            <span class="status-pill">
              Progressing
            </span>

          </div>

          <p class="dog-subtitle">
            Border Collie · 2 years old
          </p>

          <div class="dog-meta">

            <div class="meta-pill">
              <i data-lucide="user"></i>
              Emma Collins
            </div>

            <div class="meta-pill">
              <i data-lucide="calendar-check"></i>
              16 sessions
            </div>

          </div>

        </div>

      </a>

    </section>

  </main>

  <nav class="bottom-nav">

    <a href="trainer-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="home"></i>
      </div>
      Home
    </a>

    <a href="session-detail.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="calendar-check"></i>
      </div>
      Sessions
    </a>

    <a href="dogs.html" class="bottom-nav-item active">
      <div class="bottom-nav-icon">
        <i data-lucide="dog"></i>
      </div>
      Dogs
    </a>

    <a href="club-dashboard.html" class="bottom-nav-item">
      <div class="bottom-nav-icon">
        <i data-lucide="building-2"></i>
      </div>
      School
    </a>

  </nav>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
